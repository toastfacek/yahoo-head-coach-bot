name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check (orchestrator, no emit)
        run: npx tsc -p apps/orchestrator/tsconfig.json --noEmit
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          YAHOO_CLIENT_ID: dummy
          YAHOO_CLIENT_SECRET: dummy
          YAHOO_REDIRECT_URI: http://localhost:3000/callback
          ANTHROPIC_API_KEY: dummy
          AI_MODEL: claude-3-5-sonnet-20241022
          EXECUTION_MODE: stage
      - name: Run tests (orchestrator)
        run: npm run -w @yahoo-fantasy-bot/orchestrator test
      - name: Lint (orchestrator)
        run: npm run -w @yahoo-fantasy-bot/orchestrator lint
      - name: Prettier check (orchestrator)
        run: npm run -w @yahoo-fantasy-bot/orchestrator format:check
