[build]
builder = "nixpacks"
# Ensure dev dependencies are installed (for ts-node) and generate Prisma client
buildCommand = "npm install --production=false && npx prisma generate --schema=packages/data/prisma/schema.prisma"

[deploy]
# Delegate startup to the Docker entrypoint script so Docker and Railway configs stay in sync
startCommand = "sh /app/docker-start.sh"
healthcheckPath = "/health"
restartPolicyType = "always"

[env]
NODE_ENV = "production"
SERVICE = "discord"
NPM_CONFIG_PRODUCTION = "false"
