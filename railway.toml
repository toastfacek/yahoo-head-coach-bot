[build]
builder = "nixpacks"
# Ensure dev dependencies are installed (for ts-node) and generate Prisma client
buildCommand = "npm install --production=false && npx prisma generate --schema=packages/data/prisma/schema.prisma"

[deploy]
# Run via ts-node in transpile-only mode to avoid typecheck build failures
startCommand = "TS_NODE_PROJECT=apps/discord-bot/tsconfig.json node -r ts-node/register/transpile-only apps/discord-bot/src/bot.ts"
healthcheckPath = "/health"
restartPolicyType = "always"

[env]
NODE_ENV = "production"
SERVICE = "discord"
NPM_CONFIG_PRODUCTION = "false"
