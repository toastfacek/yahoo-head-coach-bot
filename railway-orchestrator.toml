[build]
builder = "nixpacks"
buildCommand = "npm install && npx prisma generate --schema=packages/data/prisma/schema.prisma"

[deploy]
startCommand = "npx ts-node apps/orchestrator/src/server.ts"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "always"

[env]
NODE_ENV = "production"
PORT = "3000"
SERVICE = "orchestrator"
NODE_OPTIONS = "--max-old-space-size=2048"
