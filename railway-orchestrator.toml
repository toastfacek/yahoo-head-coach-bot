[build]
builder = "nixpacks"
buildCommand = "npm install && npx prisma generate --schema=packages/data/prisma/schema.prisma && npm run -w @yahoo-fantasy-bot/orchestrator build"

[deploy]
startCommand = "node apps/orchestrator/dist/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "always"

[env]
NODE_ENV = "production"
SERVICE = "orchestrator"
NODE_OPTIONS = "--max-old-space-size=2048"
