[build]
builder = "nixpacks"
buildCommand = "npm install && npx prisma generate --schema=packages/data/prisma/schema.prisma"

[deploy]
# Delegate startup to the Docker entrypoint script so Docker and Railway configs stay in sync
startCommand = "sh /app/docker-start.sh"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "always"

[env]
NODE_ENV = "production"
SERVICE = "orchestrator"
NODE_OPTIONS = "--max-old-space-size=512"
